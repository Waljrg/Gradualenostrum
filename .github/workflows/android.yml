name: Build Android APK
on:
  push:
    branches: [ main, principal ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 1.0
      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/android @capacitor/assets
      - name: Generate Icons
        run: npx capacitor-assets generate --android
      - name: Initialize Android
        run: |
          npx cap add android || true
          npx cap sync
      - name: Build APK
        run: |
          cd android && ./gradlew assembleDebug
      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/Gradualenostrum.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Graduale Nostrum
          path: android/app/build/outputs/apk/debug/Graduale Nostrum.apk

